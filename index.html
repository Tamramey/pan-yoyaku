<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>パン教室 レッスン予約カレンダー</title>
<!-- 見た目はcssフォルダのstyle.cssに分離 -->
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="wrap">

  <header class="site-head">
    <div class="logo">🥐</div>
    <h1>パン教室 レッスンカレンダー</h1>
    <p class="lead">ご希望の日程をお選びください。<br>残席のある日をタップすると予約に進めます。</p>
  </header>

  <main>
    <!-- 月の切り替えナビ -->
    <div class="cal-nav">
      <button id="prevBtn" class="nav-btn" aria-label="前の月">‹</button>
      <h2 id="calTitle">----年--月</h2>
      <button id="nextBtn" class="nav-btn" aria-label="次の月">›</button>
    </div>

    <!-- 凡例 -->
    <div class="legend">
      <span class="lg"><i class="dot open"></i>予約できます</span>
      <span class="lg"><i class="dot few"></i>残りわずか</span>
      <span class="lg"><i class="dot full"></i>満席</span>
    </div>

    <!-- カレンダー本体(JavaScriptがここに描画します) -->
    <div class="calendar" id="calendar"></div>

    <p class="note">
      ※レッスンは対面・少人数制です。表示の残席数は目安で、確定はご予約完了時となります。
    </p>
  </main>

  <footer class="site-foot">
    パン教室(仮) — 予約システム プロトタイプ ステップ1
  </footer>

</div>

<!-- 動きはjsフォルダのcalendar.jsに分離 -->
<script src="js/calendar.js"></script>
</body>
</html>
